<script>
    $(document).ready(function () {
        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@'
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/'
        {% endif %}
        var jsonUrl = gsDataBaseUrl + "google-scholar-stats/gs_data.json";
        console.log("Fetching Google Scholar data from:", jsonUrl);
        $.getJSON(jsonUrl, function (data) {
            console.log("Google Scholar data loaded successfully:", data);
            var totalCitation = data['citedby']
            var totalCitElement = document.getElementById('total_cit');
            if (totalCitElement) {
                totalCitElement.innerHTML = totalCitation;
            }
            var citationEles = document.getElementsByClassName('show_paper_citations')
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                console.log("Processing paper ID:", paperId);
                if (data['publications'] && data['publications'][paperId]) {
                    var numCitations = data['publications'][paperId]['num_citations']
                    element.innerHTML = '| Citations: ' + numCitations;
                } else {
                    console.warn("Publication not found for ID:", paperId);
                    element.innerHTML = '| Citations: N/A';
                }
            });
        }).fail(function (jqXHR, textStatus, errorThrown) {
            console.error("Failed to load Google Scholar data:", textStatus, errorThrown);
            console.error("URL attempted:", jsonUrl);
        });
    })
</script>
